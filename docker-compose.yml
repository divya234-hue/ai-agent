version: '3.9'
services:
  api:
    build: .
    ports:
      - '8000:8000'
    environment:
      APP_ENV: development
      APP_SECRET: change-me
    volumes:
      - ./backend:/app/backend
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
